name: Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      publish_binaries:
        description: Build executables and publish a GitHub pre-release (no conventional commit required)
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  semantic-release:
    name: Analyze commits & bump version
    runs-on: ubuntu-24.04
    outputs:
      published: ${{ steps.semrel.outputs.new_release_published }}
      version: ${{ steps.semrel.outputs.new_release_version }}
      tag: ${{ steps.semrel.outputs.new_release_git_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install semantic-release
        run: npm ci

      - name: Run semantic-release
        id: semrel
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  plan-release:
    name: Plan release
    needs: semantic-release
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.plan.outputs.should_build }}
      checkout_ref: ${{ steps.plan.outputs.checkout_ref }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      release_version: ${{ steps.plan.outputs.release_version }}
      prerelease: ${{ steps.plan.outputs.prerelease }}
      use_changelog: ${{ steps.plan.outputs.use_changelog }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide release plan
        id: plan
        run: |
          if [ "${{ needs.semantic-release.outputs.published }}" = "true" ]; then
            {
              echo "should_build=true"
              echo "checkout_ref=${{ needs.semantic-release.outputs.tag }}"
              echo "release_tag=${{ needs.semantic-release.outputs.tag }}"
              echo "release_version=${{ needs.semantic-release.outputs.version }}"
              echo "prerelease=false"
              echo "use_changelog=true"
            } >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish_binaries }}" = "true" ]; then
            VERSION=$(grep '^APP_VERSION=' APP_METADATA | cut -d= -f2)
            TAG="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
            {
              echo "should_build=true"
              echo "checkout_ref=${{ github.sha }}"
              echo "release_tag=${TAG}"
              echo "release_version=${VERSION}-build.${GITHUB_RUN_NUMBER}"
              echo "prerelease=true"
              echo "use_changelog=false"
            } >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build-linux:
    name: Build Linux
    needs: plan-release
    if: needs.plan-release.outputs.should_build == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan-release.outputs.checkout_ref }}
          submodules: recursive

      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libgtk-4-dev libepoxy-dev libx11-dev \
            libtirpc-dev libltdl-dev python3-venv \
            autoconf automake autoconf-archive \
            freetds-dev libgnutls28-dev libkrb5-dev

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "77df67cfff9c12ccfdb52284e07c87c75092f723"

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build_release/vcpkg_installed
          key: vcpkg-installed-linux-${{ hashFiles('vcpkg.json') }}-0a434205
          restore-keys: |
            vcpkg-installed-linux-

      - name: Inject secrets into APP_METADATA
        run: |
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> APP_METADATA
          echo "POLAR_ORGANIZATION_ID=${{ secrets.POLAR_ORGANIZATION_ID }}" >> APP_METADATA
          echo "CREDS_SECRET=${{ secrets.CREDS_SECRET }}" >> APP_METADATA

      - name: Build and package
        run: |
          export CMAKE_GENERATOR=Ninja
          ./scripts/build release

      - name: Prepare Linux artifacts
        run: |
          APP_NAME=$(grep '^APP_NAME=' APP_METADATA | cut -d= -f2)
          APPIMAGE_NAME="${APP_NAME}-x86_64.AppImage"
          mkdir -p release-artifacts
          cp "build_release/${APPIMAGE_NAME}" release-artifacts/
          cp "build_release/${APPIMAGE_NAME}.sha256" release-artifacts/
          chmod +x "release-artifacts/${APPIMAGE_NAME}"
          echo "${APPIMAGE_NAME}" > release-artifacts/linux-appimage-name.txt

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqleditor-linux
          path: release-artifacts/
          retention-days: 14

  build-windows:
    name: Build Windows
    needs: plan-release
    if: needs.plan-release.outputs.should_build == 'true'
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan-release.outputs.checkout_ref }}
          submodules: recursive

      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install gperf
        shell: pwsh
        run: choco install gperf --version=3.1 -y --no-progress

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "77df67cfff9c12ccfdb52284e07c87c75092f723"

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build_release/vcpkg_installed
          key: vcpkg-installed-windows-${{ hashFiles('vcpkg.json') }}-ca6170b7
          restore-keys: |
            vcpkg-installed-windows-

      - name: Inject secrets into APP_METADATA
        run: |
          Add-Content APP_METADATA "SENTRY_DSN=${{ secrets.SENTRY_DSN }}"
          Add-Content APP_METADATA "POLAR_ORGANIZATION_ID=${{ secrets.POLAR_ORGANIZATION_ID }}"
          Add-Content APP_METADATA "CREDS_SECRET=${{ secrets.CREDS_SECRET }}"

      - name: Build and package
        run: .\scripts\build-msi.ps1

      - name: Prepare Windows artifacts
        shell: pwsh
        run: |
          $appName = ((Select-String -Path APP_METADATA -Pattern '^APP_NAME=').Line -split '=', 2)[1]
          $msiName = "$appName-x64.msi"
          & "$PWD\scripts\package-windows-portable.ps1"
          $zipName = "$appName-windows-x64-portable.zip"
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          Copy-Item "build_release/$msiName" "release-artifacts/"
          Copy-Item "build_release/$zipName" "release-artifacts/"
          Set-Content -Path release-artifacts/windows-msi-name.txt -Value $msiName
          Set-Content -Path release-artifacts/windows-zip-name.txt -Value $zipName

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqleditor-windows
          path: release-artifacts/
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    needs: [plan-release, build-linux, build-windows]
    if: needs.plan-release.outputs.should_build == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan-release.outputs.checkout_ref }}

      - name: Write release notes
        run: |
          if [ "${{ needs.plan-release.outputs.use_changelog }}" = "true" ]; then
            VERSION="${{ needs.plan-release.outputs.release_version }}"
            awk -v version="${VERSION}" '
              $0 ~ "^## \\[" version "\\]" { found=1; next }
              found && /^## \[/ { exit }
              found { print }
            ' CHANGELOG.md > release-notes.md
          else
            cat > release-notes.md <<'EOF'
          ## Downloads

          Pre-built executables — no compilation required.

          ### Linux (x86_64)
          1. Download `SQLEditor-x86_64.AppImage`
          2. Run:
          ```sh
          chmod +x SQLEditor-x86_64.AppImage
          ./SQLEditor-x86_64.AppImage
          ```

          ### Windows (x64)
          - **Portable:** unzip `SQLEditor-windows-x64-portable.zip` and run `SQLEditor.exe`
          - **Installer:** run `SQLEditor-x64.msi`
          EOF
          fi

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: sqleditor-linux
          path: artifacts/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: sqleditor-windows
          path: artifacts/windows

      - name: Create version metadata
        run: |
          APPIMAGE_NAME=$(cat artifacts/linux/linux-appimage-name.txt)
          MSI_NAME=$(cat artifacts/windows/windows-msi-name.txt)
          ZIP_NAME=$(cat artifacts/windows/windows-zip-name.txt)
          SHA256=$(cut -d' ' -f1 "artifacts/linux/${APPIMAGE_NAME}.sha256")
          TAG="${{ needs.plan-release.outputs.release_tag }}"
          VERSION="${{ needs.plan-release.outputs.release_version }}"

          cat > artifacts/version.json <<EOF
          {
            "version": "${VERSION}",
            "tag": "${TAG}",
            "downloads": {
              "linux-appimage-x86_64": {
                "file": "${APPIMAGE_NAME}",
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${APPIMAGE_NAME}",
                "sha256": "${SHA256}"
              },
              "windows-portable-x64": {
                "file": "${ZIP_NAME}",
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ZIP_NAME}"
              },
              "windows-installer-x64": {
                "file": "${MSI_NAME}",
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${MSI_NAME}"
              }
            }
          }
          EOF

      - name: Stage release files
        run: |
          APPIMAGE_NAME=$(cat artifacts/linux/linux-appimage-name.txt)
          MSI_NAME=$(cat artifacts/windows/windows-msi-name.txt)
          ZIP_NAME=$(cat artifacts/windows/windows-zip-name.txt)
          mkdir -p release-upload
          cp "artifacts/linux/${APPIMAGE_NAME}" release-upload/
          cp "artifacts/linux/${APPIMAGE_NAME}.sha256" release-upload/
          cp "artifacts/windows/${MSI_NAME}" release-upload/
          cp "artifacts/windows/${ZIP_NAME}" release-upload/
          cp artifacts/version.json release-upload/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan-release.outputs.release_tag }}
          name: SQLEditor ${{ needs.plan-release.outputs.release_version }}
          body_path: release-notes.md
          prerelease: ${{ needs.plan-release.outputs.prerelease }}
          files: release-upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
