name: Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  semantic-release:
    name: Analyze commits & bump version
    runs-on: ubuntu-24.04
    outputs:
      published: ${{ steps.semrel.outputs.new_release_published }}
      version: ${{ steps.semrel.outputs.new_release_version }}
      tag: ${{ steps.semrel.outputs.new_release_git_tag }}
      notes: ${{ steps.semrel.outputs.new_release_notes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install semantic-release
        run: npm ci

      - name: Run semantic-release
        id: semrel
        uses: semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux
    needs: semantic-release
    if: needs.semantic-release.outputs.published == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.tag }}
          submodules: recursive

      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libgtk-4-dev libepoxy-dev libx11-dev \
            libtirpc-dev libltdl-dev python3-venv \
            autoconf automake autoconf-archive \
            freetds-dev libgnutls28-dev libkrb5-dev

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "77df67cfff9c12ccfdb52284e07c87c75092f723"

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build_release/vcpkg_installed
          key: vcpkg-installed-linux-${{ hashFiles('vcpkg.json') }}-0a434205
          restore-keys: |
            vcpkg-installed-linux-

      - name: Inject secrets into APP_METADATA
        run: |
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> APP_METADATA
          echo "POLAR_ORGANIZATION_ID=${{ secrets.POLAR_ORGANIZATION_ID }}" >> APP_METADATA
          echo "CREDS_SECRET=${{ secrets.CREDS_SECRET }}" >> APP_METADATA

      - name: Build and package
        run: |
          export CMAKE_GENERATOR=Ninja
          ./scripts/build release

      - name: Prepare Linux artifacts
        run: |
          APP_NAME=$(grep '^APP_NAME=' APP_METADATA | cut -d= -f2)
          APPIMAGE_NAME="${APP_NAME}-x86_64.AppImage"
          mkdir -p release-artifacts
          cp "build_release/${APPIMAGE_NAME}" release-artifacts/
          cp "build_release/${APPIMAGE_NAME}.sha256" release-artifacts/
          echo "${APPIMAGE_NAME}" > release-artifacts/linux-appimage-name.txt

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqleditor-linux
          path: release-artifacts/
          retention-days: 14

  build-windows:
    name: Build Windows
    needs: semantic-release
    if: needs.semantic-release.outputs.published == 'true'
    runs-on: windows-2022

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.tag }}
          submodules: recursive

      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install gperf
        shell: pwsh
        run: choco install gperf --version=3.1 -y --no-progress

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "77df67cfff9c12ccfdb52284e07c87c75092f723"

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build_release/vcpkg_installed
          key: vcpkg-installed-windows-${{ hashFiles('vcpkg.json') }}-ca6170b7
          restore-keys: |
            vcpkg-installed-windows-

      - name: Inject secrets into APP_METADATA
        run: |
          Add-Content APP_METADATA "SENTRY_DSN=${{ secrets.SENTRY_DSN }}"
          Add-Content APP_METADATA "POLAR_ORGANIZATION_ID=${{ secrets.POLAR_ORGANIZATION_ID }}"
          Add-Content APP_METADATA "CREDS_SECRET=${{ secrets.CREDS_SECRET }}"

      - name: Build and package
        run: .\scripts\build-msi.ps1

      - name: Prepare Windows artifacts
        shell: pwsh
        run: |
          $appName = ((Select-String -Path APP_METADATA -Pattern '^APP_NAME=').Line -split '=', 2)[1]
          $msiName = "$appName-x64.msi"
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          Copy-Item "build_release/$msiName" "release-artifacts/"
          Set-Content -Path release-artifacts/windows-msi-name.txt -Value $msiName

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqleditor-windows
          path: release-artifacts/
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    needs: [semantic-release, build-linux, build-windows]
    if: needs.semantic-release.outputs.published == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.tag }}

      - name: Extract release notes
        run: |
          VERSION="${{ needs.semantic-release.outputs.version }}"
          awk -v version="${VERSION}" '
            $0 ~ "^## \\[" version "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: sqleditor-linux
          path: artifacts/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: sqleditor-windows
          path: artifacts/windows

      - name: Create version metadata
        run: |
          APPIMAGE_NAME=$(cat artifacts/linux/linux-appimage-name.txt)
          MSI_NAME=$(cat artifacts/windows/windows-msi-name.txt)
          SHA256=$(cut -d' ' -f1 "artifacts/linux/${APPIMAGE_NAME}.sha256")
          TAG="${{ needs.semantic-release.outputs.tag }}"
          VERSION="${{ needs.semantic-release.outputs.version }}"

          cat > artifacts/version.json <<EOF
          {
            "version": "${VERSION}",
            "tag": "${TAG}",
            "release_notes": "",
            "downloads": {
              "appimage-x86_64": {
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${APPIMAGE_NAME}",
                "sha256": "${SHA256}"
              },
              "msi-x64": {
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${MSI_NAME}"
              }
            }
          }
          EOF

      - name: Stage release files
        run: |
          APPIMAGE_NAME=$(cat artifacts/linux/linux-appimage-name.txt)
          MSI_NAME=$(cat artifacts/windows/windows-msi-name.txt)
          mkdir -p release-upload
          cp "artifacts/linux/${APPIMAGE_NAME}" release-upload/
          cp "artifacts/linux/${APPIMAGE_NAME}.sha256" release-upload/
          cp "artifacts/windows/${MSI_NAME}" release-upload/
          cp artifacts/version.json release-upload/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.semantic-release.outputs.tag }}
          name: SQLEditor ${{ needs.semantic-release.outputs.version }}
          body_path: release-notes.md
          prerelease: false
          files: release-upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
